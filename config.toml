[api]
base_url = "https://readwise.io/api/v3/list/"
pagination_delay_ms = 3000
default_limit = 100
timeout_ms = 30000

[output]
default_fields = [ "id", "title", "author", "url", "source_url", "summary", "tags", "published_date", "category" ]

[openrouter]
api_url = "https://openrouter.ai/api/v1"
min_param_b = 27
max_age_days = 180
concurrency = 4
timeout_ms = 10000
max_candidates = 10
smart_picks = 3
extra_runs = 2

[summarize]
model = "nvidia/nemotron-3-nano-30b-a3b:free"
max_tokens = 300
timeout_ms = 30000
concurrency = 3
temperature = 0.7
user_prompt_template = "Title: {title}\nAuthor: {author}\n\n<article>\n{html_content}\n</article>"
