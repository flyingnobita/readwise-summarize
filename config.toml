[api]
base_url = "https://readwise.io/api/v3/list/"
# Delay in milliseconds between paginated requests to avoid rate limiting
pagination_delay_ms = 3000
default_limit = 100

[output]
default_fields = [
  "id",
  "title",
  "author",
  "url",
  "summary",
  "tags",
  "published_date",
  "category",
]

[openrouter]
api_url = "https://openrouter.ai/api/v1"
min_param_b = 27
max_age_days = 180
concurrency = 4
timeout_ms = 10000
max_candidates = 10
smart_picks = 3
extra_runs = 2
