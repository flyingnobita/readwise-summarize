[api]
base_url = "https://readwise.io/api/v3/list/"
pagination_delay_ms = 3000
default_limit = 100
timeout_ms = 30000

[output]
default_fields = [ "id", "title", "author", "url", "source_url", "summary", "tags", "published_date", "category" ]

[openrouter]
api_url = "https://openrouter.ai/api/v1"
min_param_b = 27
max_age_days = 180
concurrency = 4
timeout_ms = 10000
max_candidates = 10
smart_picks = 3
extra_runs = 2

[summarize]
model = "nvidia/nemotron-3-nano-30b-a3b:free"
max_tokens = 0
length_instruction = "Target length: around 500 characters."
timeout_ms = 30000
concurrency = 3
temperature = 0.7
system_prompt = """
You are a precise summarization engine.
Follow the user instructions in <instructions> exactly.
Never mention sponsors/ads/promos or that they were skipped or ignored.
Do not output sponsor/ad/promo language or brand names or CTA phrases.
Never output the literal strings "Title:" or "Headline:" anywhere; use Markdown heading syntax (## Heading) instead.
Quotation marks are allowed; use straight quotes only (no curly quotes).
If you include exact excerpts, italicize them in Markdown using single asterisks.
Include 1-2 short exact excerpts (max 25 words each) when the content provides a strong, non-sponsor line.
Never include ad/sponsor/boilerplate excerpts."""
user_prompt_template = "<instructions>\n{instructions}\n</instructions>\n\n<context>\nSource URL: {url}\nTitle: {title}\nAuthor: {author}\n</context>\n\n<content>\n{html_content}\n</content>"
