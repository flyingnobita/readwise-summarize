name: Publish npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    env:
      READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
      OPEN_ROUTER_SUMMARIZE_API: ${{ secrets.OPEN_ROUTER_SUMMARIZE_API }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@latest

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('./package.json', 'utf8')).version")"
          TAG_VERSION="${RELEASE_TAG#v}"

          if [ "$TAG_VERSION" = "$RELEASE_TAG" ]; then
            echo "Release tag must start with v: $RELEASE_TAG" >&2
            exit 1
          fi

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Run unit tests
        run: pnpm test

      - name: Run integration tests
        run: pnpm test:integration

      - name: Build package
        run: pnpm build

      - name: Publish to npm
        run: npm publish --access public --provenance
